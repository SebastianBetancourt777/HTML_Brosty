<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROSTY <img src="/images/logo-brosty.png" alt="brosty"> </title>
    <link rel="stylesheet" href="./css/claseCss/style.css">
</head>
<body>
    <header class="navbar">
        <div class="caja_logo">
            <img src="images/logo_brosty.png" height="100px" alt="">
        </div>
        <nav class="nav-links">
            <a href="./pagina-principal.html">INICIO</a>
            <a href="./inventario.html">INVENTARIO</a>
            <a href="./logistica.html">LOGISTICA</a>
            <a href="./reportes.html">REPORTES</a>
            <a href="./nomina.html">NOMINA</a>
            <a href="./gestion_personal.html">GESTION DE PERSONAL</a>  
        </nav>
    </header>

    <hr><br><br>

   <form id="formEmpleado" class="formulario">
  <fieldset>
    <legend>Asadero Brosty - Gestión de Personal y Horarios</legend>

    <label for="nombres">Nombre Completo:</label>
    <input type="text" name="nombres" id="nombres" required><br><br>

    <label for="cedula">Cédula:</label>
    <input type="number" name="cedula" id="cedula" required><br><br>

    <label for="cargo">Cargo:</label>
    <select name="cargo" id="cargo">
      <option value="cajero">Cajero</option>
      <option value="hornero">Hornero</option>
      <option value="admin">Administrador</option>
      <option value="mesero">Mesero/a</option>
      <option value="domiciliario">Domiciliario</option>
    </select><br><br>

    <label for="telefono">Teléfono:</label>
    <input type="number" name="telefono" id="telefono" required><br><br>

    <label for="ingreso">Fecha de ingreso:</label>
    <input type="date" id="ingreso"><br><br>

    <h3>Horario Semanal</h3>
    <table>
      <thead>
        <tr>
          <th>Día</th>
          <th>Entrada</th>
          <th>Salida</th>
        </tr>
      </thead>
      <tbody id="tabla-horario">
        <!-- Recorremos los días con JS luego si quieres -->
        <tr>
          <td>Lunes</td>
          <td><input type="time" name="entrada_lunes"></td>
          <td><input type="time" name="salida_lunes"></td>
        </tr>
        <tr>
          <td>Martes</td>
          <td><input type="time" name="entrada_martes"></td>
          <td><input type="time" name="salida_martes"></td>
        </tr>
        <tr>
          <td>Miércoles</td>
          <td><input type="time" name="entrada_miercoles"></td>
          <td><input type="time" name="salida_miercoles"></td>
        </tr>
        <tr>
          <td>Jueves</td>
          <td><input type="time" name="entrada_jueves"></td>
          <td><input type="time" name="salida_jueves"></td>
        </tr>
        <tr>
          <td>Viernes</td>
          <td><input type="time" name="entrada_viernes"></td>
          <td><input type="time" name="salida_viernes"></td>
        </tr>
        <tr>
          <td>Sábado</td>
          <td><input type="time" name="entrada_sabado"></td>
          <td><input type="time" name="salida_sabado"></td>
        </tr>
        <tr>
          <td>Domingo</td>
          <td><input type="time" name="entrada_domingo"></td>
          <td><input type="time" name="salida_domingo"></td>
        </tr>
      </tbody>
    </table>

    <br>
    <button type="submit">Guardar Empleado</button>
  </fieldset>
</form>

<hr>

<h2>Horarios Registrados</h2>
<table border="1" id="tabla-empleados">
  <thead>
    <tr>
      <th>Cédula</th>
      <th>Nombre</th>
      <th>Cargo</th>
      <th>Día</th>
      <th>Entrada</th>
      <th>Salida</th>
    </tr>
  </thead>
  <tbody>
    <!-- Aquí se agregarán los empleados -->
  </tbody>
</table>


   
    
</body>
</html>
